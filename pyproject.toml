[project]
name = "gpt-racing"
version = "0.1.0"
description = ""
authors = [
    {name = "Logan Grado", email = "grado.logan@gmail.com"},
]
dependencies = [
    "numpy>1",
    "pandas>2",
    "click>=8.1.7",
    "iracingdataapi>=1.1.3",
    "pydantic>=2.5.2",
    "jsonnet>=0.20.0",
    "elommr>=1.2.1",
    "polars>=1.8.2",
    "great-tables>=0.12.0",
    "pyarrow>=17.0.0",
    "selenium>=4.25.0",
    "pyqt5>=5.15.11",
    "ipympl>=0.9.4",
]
requires-python = ">=3.11"
readme = "README.md"
license = {text = "MIT"}

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm.dev-dependencies]
dev = [
    "ipython>=8.15.0",
    "ipdb>=0.13.13",
    "pytest>=7.4.2",
]
jupyter = [
    "jupyter>=1.0.0",
    "jupyterlab>=4.0.9",
    "matplotlib>=3.8.2",
    "pyqt6>=6.6.1",
    "ipympl>=0.9.3",
]
