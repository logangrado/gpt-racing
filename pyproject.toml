[project]
name = "gpt-racing"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    {name = "Logan Grado", email = "grado.logan@gmail.com"},
]
dependencies = [
    "numpy>1",
    "pandas>2",
    "click>=8.1.7",
    "iracingdataapi>=1.1.3",
    "pydantic>=2.5.2",
    "jsonnet>=0.20.0",
    "elommr>=1.2.1",
    "polars>=1.8.2",
    "great-tables>=0.12.0",
    "pyarrow>=17.0.0",
    "selenium>=4.25.0",
    "pyqt5>=5.15.11",
    "ipympl>=0.9.4",
    "loggerado>=0.2.0",
]
requires-python = ">=3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "black>=25.1.0",
    "flake8>=7.2.0",
    "ipdb>=0.13.13",
    "ipython>=9.3.0",
    "pytest>=8.4.0",
]
